name: Build and Test
run-name: ${{ github.actor }} is building and testing the frontend
on:
  push:
    branches: 
      - master
  pull_request:
    branches: 
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build frontend
        run: docker build -f frontend/Dockerfile --target base -t frontend-base ./frontend
      - name: Run frontend tests
        run: docker run --rm frontend-base pnpm test:ci
      - name: Run frontend lint
        run: docker run --rm frontend-base pnpm lint
      - name: Run frontend type check
        run: docker run --rm frontend-base pnpm check
      - name: Run frontend format check
        run: docker run --rm frontend-base pnpm format:check