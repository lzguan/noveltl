services:
  dev:
    image: dev
    build:
      context: .
      dockerfile: ./Dockerfile
      target: dev
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}

      TEST_HOST: test_db
      TEST_PORT: ${TEST_PORT}
      TEST_USER: ${TEST_USER}
      TEST_PASSWORD: ${TEST_PASSWORD}
      TEST_NAME: ${TEST_NAME}
      TEST_URL: postgresql+psycopg2://${TEST_USER}:${TEST_PASSWORD}@test_db:5432/${TEST_NAME}

      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      - db
    volumes:
      - .:/app
  db:
    image: postgres
    restart: always
    
    ports:
      - "${DB_PORT}:5432" 
      
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      
    volumes:
      - db_data:/var/lib/postgresql/data
  test_db:
    image: postgres
    restart: always
    
    ports:
      - "${TEST_PORT}:5432" 
      
    environment:
      POSTGRES_USER: "${TEST_USER}"
      POSTGRES_PASSWORD: "${TEST_PASSWORD}"
      POSTGRES_DB: "${TEST_NAME}"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    profiles:
      - test
  redis:
    image: redis
    ports:
      - "${REDIS_PORT}:6379"
  worker:
    build: 
      context: .
      target: worker
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}

      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - .:/app
  backend:
    build: 
      context: .
      target: backend
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}

      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - .:/app
    ports:
      - 8000:8000

volumes:
  db_data: