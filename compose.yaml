x-db-env: &db-env
  DB_HOST: db
  DB_PORT: ${DB_PORT}
  DB_NAME: ${DB_NAME}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}

x-test-db-env: &test-db-env
  TEST_HOST: test_db
  TEST_PORT: ${TEST_PORT}
  TEST_USER: ${TEST_USER}
  TEST_PASSWORD: ${TEST_PASSWORD}
  TEST_NAME: ${TEST_NAME}
  TEST_URL: postgresql+psycopg2://${TEST_USER}:${TEST_PASSWORD}@test_db:5432/${TEST_NAME}

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: ${REDIS_PORT}

services:
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/project
    environment:
      <<: [*db-env, *test-db-env, *redis-env]
      SECRET_KEY: ${SECRET_KEY}
    command: sleep infinity

  db:
    image: postgres:18
    restart: always
    
    ports:
      - "${DB_PORT}:5432" 
      
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      
    volumes:
      - db_data:/var/lib/postgresql/data

  test_db:
    image: postgres:18
    restart: always
    
    ports:
      - "${TEST_PORT}:5432" 
      
    environment:
      POSTGRES_USER: "${TEST_USER}"
      POSTGRES_PASSWORD: "${TEST_PASSWORD}"
      POSTGRES_DB: "${TEST_NAME}"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    profiles:
      - test
  redis:
    image: redis
    ports:
      - "${REDIS_PORT}:6379"

  worker:
    build: 
      context: ./backend
      target: worker
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      <<: [*db-env, *redis-env]
      
      SECRET_KEY: ${SECRET_KEY} # purely to not crash on startup
    volumes:
      - ./backend:/project

  backend:
    build: 
      context: ./backend
      target: backend
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      <<: [*db-env, *redis-env]

      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./backend:/project
    ports:
      - "${BACKEND_PORT}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/project
    ports:
      - "${FRONTEND_PORT}:5173"

volumes:
  db_data: