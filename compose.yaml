x-db-env: &db-env
  DB_HOST: db
  DB_NAME: ${DB_NAME}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}

x-test-db-env: &test-db-env
  TEST_HOST: test_db
  TEST_USER: ${TEST_USER}
  TEST_PASSWORD: ${TEST_PASSWORD}
  TEST_NAME: ${TEST_NAME}
  TEST_URL: postgresql+psycopg2://${TEST_USER}:${TEST_PASSWORD}@test_db:5432/${TEST_NAME}

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: ${REDIS_PORT}

services:
  dev:
    image: ghcr.io/${GHCR_OWNER:-lzguan}/noveltl-devcontainer:${DEV_IMAGE_TAG:-latest}
    environment:
      <<: [*db-env, *test-db-env, *redis-env]
      SECRET_KEY: ${SECRET_KEY}
    command: sleep infinity

  db:
    image: postgres:18
    restart: always

    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      
    volumes:
      - db_data:/var/lib/postgresql

  test_db:
    image: postgres:18
    restart: always
      
    environment:
      POSTGRES_USER: "${TEST_USER}"
      POSTGRES_PASSWORD: "${TEST_PASSWORD}"
      POSTGRES_DB: "${TEST_NAME}"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    profiles:
      - test
  redis:
    image: redis
  test_redis:
    image: redis

  worker:
    image: ghcr.io/${GHCR_OWNER:-lzguan}/noveltl-worker:${IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      - db
      - redis
    environment:
      <<: [*db-env, *redis-env]
      UV_COMPILE_BYTECODE: false
      SECRET_KEY: ${SECRET_KEY} # purely to not crash on startup
    volumes:
      - ./backend:/home/newuser/backend
      - /home/newuser/backend/.venv
      - /home/newuser/backend/logs
    profiles:
      - manual

  backend:
    image: ghcr.io/${GHCR_OWNER:-lzguan}/noveltl-backend-dev:${DEV_IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      - db
      - redis
    environment:
      <<: [*db-env, *redis-env]
      PYTHONDONTWRITEBYTECODE: "1"
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./backend:/home/newuser/backend
      - /home/newuser/backend/.venv
      - /home/newuser/backend/backend.log
    ports:
      - "${BACKEND_PORT}:8000"

  frontend:
    image: ghcr.io/${GHCR_OWNER:-lzguan}/noveltl-frontend-dev:${DEV_IMAGE_TAG:-latest}
    pull_policy: always
    volumes:
      - ./frontend:/home/newuser/frontend
      - /home/newuser/frontend/node_modules
    ports:
      - "${FRONTEND_PORT}:5173"

volumes:
  db_data:
